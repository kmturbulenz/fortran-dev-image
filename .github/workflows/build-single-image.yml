name: Docker image build
run-name: Build ${{ inputs.image }}

on:
  workflow_call:
    inputs:
      image:
        description: Which image to build
        required: true
        type: string
      push_image:
        description: Push image to package registry
        required: true
        type: boolean
        default: true

  workflow_dispatch:
    inputs:
      image:
        type: choice
        description: Which image to build
        required: true
        default: "intel-impi-image"
        options:
        - "intel-impi-image"
        - "gnu-ompi-image"
        - "llvm-mpich-image"
      push_image:
        type: boolean
        description: Push image to package registry
        required: true
        default: true

jobs:
  build-amd64:

    name: Build ${{ inputs.image }} (amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - uses: docker/setup-buildx-action@v4
      name: Set up Docker Buildx
      id: buildx

    - name: Create tag with current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Docker meta (arch tags)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/kmturbulenz/${{ inputs.image }}
        flavor: |
          suffix=-amd64,onlatest=false
        tags: |
          type=sha
          type=raw,prefix=date-,value=${{ steps.date.outputs.date }}

    - uses: docker/login-action@v3
      name: Login to Github Packages
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/build-push-action@v6
      name: Build image and push to GitHub Container Registry
      with:
        context: .
        target: ${{ inputs.image }}
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        push: ${{ inputs.push_image }}

  build-arm64:

    name: Build ${{ inputs.image }} (arm64)
    runs-on: ubuntu-24.04-arm
    if: ${{ inputs.image == 'gnu-ompi-image' || inputs.image == 'llvm-mpich-image' }}
    timeout-minutes: 360

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 2

    - uses: docker/setup-buildx-action@v4
      name: Set up Docker Buildx
      id: buildx

    - name: Create tag with current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Docker meta (arch tags)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/kmturbulenz/${{ inputs.image }}
        flavor: |
          suffix=-arm64,onlatest=false
        tags: |
          type=sha
          type=raw,prefix=date-,value=${{ steps.date.outputs.date }}

    - uses: docker/login-action@v3
      name: Login to Github Packages
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/build-push-action@v6
      name: Build image and push to GitHub Container Registry
      with:
        context: .
        target: ${{ inputs.image }}
        platforms: linux/arm64
        tags: ${{ steps.meta.outputs.tags }}
        push: ${{ inputs.push_image }}

  publish-multiarch-manifest:
    name: Publish multi-arch manifest for ${{ inputs.image }}
    runs-on: ubuntu-latest
    needs:
      - build-amd64
      - build-arm64
    if: ${{ inputs.push_image && needs.build-amd64.result == 'success' }}
    steps:
    - uses: docker/setup-buildx-action@v4
      name: Set up Docker Buildx

    - name: Create tag with current date
      id: date
      run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT

    - name: Docker meta (base tags)
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/kmturbulenz/${{ inputs.image }}
        tags: |
          type=sha
          type=raw,prefix=date-,value=${{ steps.date.outputs.date }}

    - uses: docker/login-action@v3
      name: Login to Github Packages
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Create multi-arch manifest
      env:
        ARM_AVAILABLE: ${{ needs.build-arm64.result == 'success' }}
      run: |
        set -euo pipefail
        while IFS= read -r tag; do
          [[ -z "$tag" ]] && continue
          if [[ "${ARM_AVAILABLE}" == "true" ]]; then
            refs=("${tag}-amd64" "${tag}-arm64")
          else
            refs=("${tag}-amd64")
          fi
          docker buildx imagetools create \
            -t "$tag" \
            "${refs[@]}"
        done <<< "${{ steps.meta.outputs.tags }}"
